name: Android CI

on:
  push:
    branches: [ main, develop ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build .EXE APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # Intentionally NOT using cache: gradle here — we use the explicit
          # actions/cache step below so we can control the exact key and paths,
          # including ~/.gradle/caches which setup-java's built-in cache skips.

      # FIX 1: validate wrapper checksum before any Gradle invocation.
      # A tampered gradlew binary is a known supply-chain attack vector.
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3
  continue-on-error: true

      # FIX 2: explicit Gradle cache covering both the wrapper and the full
      # build cache. The key includes all .kts files so any build script
      # change busts the cache precisely.
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # FIX 3: ./gradlew — the leading ./ is required; without it the shell
      # searches $PATH and cannot find the wrapper on the runner's default PATH.
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        # Skip the debug build when this is a release tag push — we only want
        # the signed release APK in that case, not an extra unsigned debug one.
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: exe-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      # ── FIX 4: release build — only runs on version tags (v*.*.*) ──────────
      # Requires four repository secrets:
      #   KEYSTORE_BASE64   — base64-encoded .jks file  (cat release.jks | base64)
      #   KEYSTORE_PASSWORD — keystore password
      #   KEY_ALIAS         — key alias inside the keystore
      #   KEY_PASSWORD      — key password
      - name: Decode release keystore
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > app/release.jks

      - name: Build release APK
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=release.jks \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
            --no-daemon --stacktrace

      - name: Upload release APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: exe-release-${{ github.ref_name }}
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      # Always remove the keystore from the runner disk, even if the build failed.
      - name: Remove keystore
        if: always() && startsWith(github.ref, 'refs/tags/v')
        run: rm -f app/release.jks
        
